name: Release image

on:
  push:
    tags:
    - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.2'
        cache: true

    - name: Run tests
      run: go test -v ./...

    - name: Set up ko
      uses: ko-build/setup-ko@v0.8

    - name: Publish image
      env:
        KO_DOCKER_REPO: ghcr.io/${{ github.repository_owner }}
      run: |
        ko build . \
          --platform=linux/amd64,linux/arm64 \
          --tags "${GITHUB_REF_NAME}" \
          --tags latest \
          --base-import-paths \
          --image-label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}"
